  /* ==========================================
   JAM DIGITAL - MODE NORMAL
========================================== */

#jam-digital{

    position:relative;

    width:100%;

    height:42px;

    margin:0 auto 20px;

    cursor:pointer;

    perspective:1000px;

    font-size:clamp(12px, 3vw, 16px);

    font-weight:bold;

    letter-spacing:1px;

}


/* ==========================================
   DEPAN & BELAKANG
========================================== */

.jam-face{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:6px;

    padding:8px 20px;

    border-radius:20px;

    color:#ffffff;

    white-space:nowrap;

    box-sizing:border-box;

    backface-visibility:hidden;

    -webkit-backface-visibility:hidden;

    transition:

        transform .7s cubic-bezier(.4,.2,.2,1);

    box-shadow:

        0 2px 8px rgba(0,0,0,.3);

}


/* ==========================================
   SISI DEPAN
========================================== */

.jam-depan{

    background:

        linear-gradient(

            135deg,

            #b71c1c,

            #8b0000

        );

}


/* ==========================================
   SISI BELAKANG
========================================== */

.jam-belakang{

    background:

        linear-gradient(

            135deg,

            #8b0000,

            #5c0000

        );

    transform:rotateY(180deg);

}


/* ==========================================
   FLIP
========================================== */

#jam-digital.flip .jam-depan{

    transform:rotateY(-180deg);

}


#jam-digital.flip .jam-belakang{

    transform:rotateY(0deg);

}


/* ==========================================
   IKON
========================================== */

#ikon-waktu{

    font-size:clamp(14px, 3vw, 20px);

    flex-shrink:0;

}


/* ==========================================
   MOBILE
========================================== */

@media(max-width:480px){

    #jam-digital{

        height:40px;

        font-size:11px;

        letter-spacing:0;

    }


    .jam-face{

        padding:8px 10px;

        gap:4px;

    }


    #ikon-waktu{

        font-size:17px;

    }

}

  // ==========================================
// JAM DIGITAL REAL-TIME + FLIP MANUAL
// ==========================================

function updateJam(){

    const daftarHari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];


    const sekarang = new Date();


    // ==========================
    // UCAPAN
    // ==========================

    const jamAngka =
        sekarang.getHours();


    let ucapan = "Selamat Malam";

    let ikon = "✨🌙";


    if(jamAngka >= 4 && jamAngka < 10){

        ucapan = "Selamat Pagi";

        ikon = "🌅";

    }

    else if(jamAngka >= 10 && jamAngka < 15){

        ucapan = "Selamat Siang";

        ikon = "☀️";

    }

    else if(jamAngka >= 15 && jamAngka < 18){

        ucapan = "Selamat Sore";

        ikon = "🌇";

    }

    else if(jamAngka >= 18 || jamAngka < 4){

        ucapan = "Selamat Malam";

        ikon = "✨🌙";

    }


    // ==========================
    // HARI
    // ==========================

    const hari =
        daftarHari[sekarang.getDay()];


    // ==========================
    // WAKTU
    // ==========================

    const jam =
        String(sekarang.getHours()).padStart(2, "0");

    const menit =
        String(sekarang.getMinutes()).padStart(2, "0");

    const detik =
        String(sekarang.getSeconds()).padStart(2, "0");


    // ==========================
    // TANGGAL
    // ==========================

    const tanggal =
        String(sekarang.getDate()).padStart(2, "0");

    const bulan =
        String(sekarang.getMonth() + 1).padStart(2, "0");

    const tahun =
        sekarang.getFullYear();


    // ==========================
    // DEPAN
    // ==========================

    document.getElementById("ucapan-waktu").textContent =
        ucapan;


    document.getElementById("ikon-waktu").textContent =
        ikon;


    // ==========================
    // BELAKANG
    // ==========================

    document.getElementById("tanggal-waktu").textContent =
        `${hari}, ${tanggal}/${bulan}/${tahun}`;


    document.getElementById("jam-waktu").textContent =
        `| ${jam}:${menit}:${detik} WIB`;


    cekDarkMode();

}


updateJam();

setInterval(updateJam, 1000);

        'https://api.open-meteo.com/v1/forecast?latitude=-6.9175&longitude=107.6191&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,weather_code'
    )
    .then(res => res.json())
    .then(async data => {

        const suhu = data.current.temperature_2m;
        const kelembapan = data.current.relative_humidity_2m;
        const presipitasi = data.current.precipitation;
        const angin = data.current.wind_speed_10m;
        const code = data.current.weather_code;

        const dataAir = await fetch(
            'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=-6.9175&longitude=107.6191&current=pm10,pm2_5'
        ).then(r => r.json());

        const pm25 = dataAir.current.pm2_5;
        const pm10 = dataAir.current.pm10;

        let kondisi = "Berawan";
        let emoji = "☁️";

        if (code === 0) {
    kondisi = "Cerah";
    emoji = "☀️";
} else if (code === 1) {
    kondisi = "Sebagian Cerah";
    emoji = "🌤️";
} else if (code === 2) {
    kondisi = "Berawan";
    emoji = "⛅";
} else if (code === 3) {
    kondisi = "Mendung";
    emoji = "☁️";
        } else if (code >= 45 && code <= 48) {
            kondisi = "Berkabut";
            emoji = "🌫️";
        } else if (code >= 51 && code <= 55) {
            kondisi = "Gerimis";
            emoji = "🌦️";
        } else if (code >= 56 && code <= 57) {
            kondisi = "Gerimis Beku";
            emoji = "🌨️";
        } else if (code >= 61 && code <= 65) {
            kondisi = "Hujan";
            emoji = "🌧️";
        } else if (code >= 66 && code <= 67) {
            kondisi = "Hujan Beku";
            emoji = "🌨️";
        } else if (code >= 71 && code <= 77) {
            kondisi = "Bersalju";
            emoji = "❄️";
        } else if (code >= 80 && code <= 82) {
            kondisi = "Hujan Deras";
            emoji = "⛈️";
        } else if (code >= 85 && code <= 86) {
            kondisi = "Badai Salju";
            emoji = "🌨️";
        } else if (code === 95) {
            kondisi = "Badai Petir";
            emoji = "⚡";
        } else if (code === 96 || code === 99) {
            kondisi = "Badai Petir Disertai Hujan Es";
            emoji = "⛈️⚡";
        }

        let kualitas = "";
        let emojiUdara = "";

        if (pm25 == null) {
            kualitas = "Data Tidak Tersedia";
            emojiUdara = "⚪";
        } else if (pm25 <= 12) {
            kualitas = "Baik";
            emojiUdara = "🟢";
        } else if (pm25 <= 35.4) {
            kualitas = "Sedang";
            emojiUdara = "🟡";
        } else if (pm25 <= 150.4) {
            kualitas = "Tidak Sehat";
            emojiUdara = "🟠";
        } else if (pm25 <= 250.4) {
            kualitas = "Sangat Tidak Sehat";
            emojiUdara = "🔴";
        } else {
            kualitas = "Berbahaya";
            emojiUdara = "⚫";
        }

       const dataCuaca = [
    `${emoji} Bandung: <b>${kondisi}, ${suhu}°C</b>`,
    `💧 Kelembapan Udara: <b>${kelembapan}%</b>`,
    `🌧️ Presipitasi: <b>${Number(presipitasi).toFixed(2)} mm</b>`,
    `💨 Kecepatan Angin: <b>${angin} km/j</b>`,
    `${emojiUdara} PM2.5: <b>${pm25 != null ? Number(pm25).toFixed(2) : '-'} µg/m³</b>`
];

        tampilkanCuaca(dataCuaca);
    })
    .catch(() => {
        const dataCuaca = [
            '☁️ Bandung: Berawan',
            '💧 Kelembapan Bandung',
            '🌧️ Presipitasi Bandung',
            '💨 Kecepatan Angin Bandung',
            '🌿 PM2.5'
        ];

        tampilkanCuaca(dataCuaca);
    });
}

function tampilkanCuaca(dataCuaca) {
    const item = document.querySelectorAll('.cuaca-item');

    dataCuaca.forEach((teks, i) => {
        if (item[i]) {
            item[i].innerHTML = teks;
        }
    });
}

    // 3. KODE INTERAKTIF GRADASI MULUS PER ANGKA (MENGGUNAKAN HSL)
    const semuaInput = document.querySelectorAll('.menu-input');
    
    semuaInput.forEach(input => {
        input.addEventListener('input', function() {
            const kotakMenu = this.closest('.menu-item');
            const jumlah = parseInt(this.value) || 0;
            
            if (jumlah > 0) {
                kotakMenu.classList.add('terpilih');
                
                let tingkatCerah = 64 - ((jumlah - 1) * 4);
                if (tingkatCerah < 24) tingkatCerah = 24; 
                
                kotakMenu.style.backgroundColor = `hsl(122, 50%, ${tingkatCerah}%)`;
            } else {
                kotakMenu.classList.remove('terpilih');
                kotakMenu.style.backgroundColor = 'rgba(255, 255, 255, 0.15)';
            }
        });
    });
    // Simpan jumlah ke localStorage
document.querySelectorAll('.menu-input').forEach(input => {
    input.addEventListener('input', function () {
        localStorage.setItem(this.name, this.value);
    });
});

// Kembalikan nilai saat halaman dibuka lagi
window.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.menu-input').forEach(input => {
        const nilai = localStorage.getItem(input.name);

        if (nilai !== null) {
            input.value = nilai;

            // Jalankan kembali efek warna hijau
            input.dispatchEvent(new Event('input'));
        }
    });
});
    function cekDarkMode() {
    const jam = new Date().getHours();

    if (jam >= 18 || jam < 6) {
        document.body.classList.add('dark-mode');
    } else {
        document.body.classList.remove('dark-mode');
    }
}
document.getElementById('reset-pesanan').addEventListener('click', () => {
    localStorage.clear();

    document.querySelectorAll('.menu-input').forEach(input => {
        input.value = 0;
        input.dispatchEvent(new Event('input'));
    });
});
