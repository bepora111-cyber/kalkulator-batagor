<script>
    // 1. KODE JAM DIGITAL REAL-TIME DENGAN UCAPAN & GAMBAR DINAMIS
    function updateJam() {
        const daftarHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const sekarang = new Date();
        
        const hari = daftarHari[sekarang.getDay()];
        const jamAngka = sekarang.getHours();
        const jam = String(jamAngka).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        const detik = String(sekarang.getSeconds()).padStart(2, '0');
        
        // Menentukan ucapan dan ikon gambar (emoji) berdasarkan waktu
        let ucapan = "Selamat Malam";
        let ikon = "🌌"; // Default Malam Hari (Bulan & Bintang/Langit Malam)
        
        if (jamAngka >= 4 && jamAngka < 10) {
            ucapan = "Selamat Pagi";
            ikon = "🌅"; // Matahari Terbit
        } else if (jamAngka >= 10 && jamAngka < 15) {
            ucapan = "Selamat Siang";
            ikon = "☀️"; // Matahari Full
        } else if (jamAngka >= 15 && jamAngka < 18) {
            ucapan = "Selamat Sore";
            ikon = "🌇"; // Matahari Terbenam
        } else if (jamAngka >= 18 || jamAngka < 4) {
            ucapan = "Selamat Malam";
            ikon = "✨🌙"; // Bulan dan Bintang
        }
        
        // Susunan teks: Ucapan di kiri, waktu di tengah, gambar di sebelah kanan jam
        const teksWaktu = `<span>${ucapan}, ${hari} | ${jam}:${menit}:${detik} WIB</span> <span class="ikon-waktu">${ikon}</span>`;
        document.getElementById("jam-digital").innerHTML = teksWaktu;
    }
    updateJam(); 
    setInterval(updateJam, 1000);

    let dataCuaca = [];
let indexCuaca = 0;

function ambilCuaca() {
    fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=-6.9175&longitude=107.6191&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,weather_code'
    )
    .then(res => res.json())
    .then(async data => {

        const suhu = data.current.temperature_2m;
        const kelembapan = data.current.relative_humidity_2m;
        const presipitasi = data.current.precipitation;
        const angin = data.current.wind_speed_10m;
        const code = data.current.weather_code;

        const dataAir = await fetch(
            'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=-6.9175&longitude=107.6191&current=pm10,pm2_5'
        ).then(r => r.json());

        const pm25 = dataAir.current.pm2_5;
        const pm10 = dataAir.current.pm10;

        let kondisi = "Berawan";
        let emoji = "☁️";

        if (code === 0) {
    kondisi = "Cerah";
    emoji = "☀️";
} else if (code === 1) {
    kondisi = "Sebagian Cerah";
    emoji = "🌤️";
} else if (code === 2) {
    kondisi = "Berawan";
    emoji = "⛅";
} else if (code === 3) {
    kondisi = "Mendung";
    emoji = "☁️";
        } else if (code >= 45 && code <= 48) {
            kondisi = "Berkabut";
            emoji = "🌫️";
        } else if (code >= 51 && code <= 55) {
            kondisi = "Gerimis";
            emoji = "🌦️";
        } else if (code >= 56 && code <= 57) {
            kondisi = "Gerimis Beku";
            emoji = "🌨️";
        } else if (code >= 61 && code <= 65) {
            kondisi = "Hujan";
            emoji = "🌧️";
        } else if (code >= 66 && code <= 67) {
            kondisi = "Hujan Beku";
            emoji = "🌨️";
        } else if (code >= 71 && code <= 77) {
            kondisi = "Bersalju";
            emoji = "❄️";
        } else if (code >= 80 && code <= 82) {
            kondisi = "Hujan Deras";
            emoji = "⛈️";
        } else if (code >= 85 && code <= 86) {
            kondisi = "Badai Salju";
            emoji = "🌨️";
        } else if (code === 95) {
            kondisi = "Badai Petir";
            emoji = "⚡";
        } else if (code === 96 || code === 99) {
            kondisi = "Badai Petir Disertai Hujan Es";
            emoji = "⛈️⚡";
        }

        let kualitas = "";
        let emojiUdara = "";

        if (pm25 == null) {
            kualitas = "Data Tidak Tersedia";
            emojiUdara = "⚪";
        } else if (pm25 <= 12) {
            kualitas = "Baik";
            emojiUdara = "🟢";
        } else if (pm25 <= 35.4) {
            kualitas = "Sedang";
            emojiUdara = "🟡";
        } else if (pm25 <= 150.4) {
            kualitas = "Tidak Sehat";
            emojiUdara = "🟠";
        } else if (pm25 <= 250.4) {
            kualitas = "Sangat Tidak Sehat";
            emojiUdara = "🔴";
        } else {
            kualitas = "Berbahaya";
            emojiUdara = "⚫";
        }

        const dataCuaca = [
            `${emoji} Bandung: <b>${kondisi}, ${suhu}°C</b>`,
            `💧 Kelembapan Udara: <b>${kelembapan}%</b>`,
            `🌧️ Presipitasi: <b>${Number(presipitasi).toFixed(2)} mm</b>`,
            `💨 Kecepatan Angin: <b>${angin} km/j</b>`,
            `${emojiUdara} Kualitas Udara: <b>${kualitas}</b>${pm25 != null ? ` (${Number(pm25).toFixed(2)} µg/m³)` : ''}`
        ];

        tampilkanCuaca(dataCuaca);
    })
    .catch(() => {
        const dataCuaca = [
            '☁️ Bandung: Berawan',
            '💧 Kelembapan Bandung',
            '🌧️ Presipitasi Bandung',
            '💨 Kecepatan Angin Bandung',
            '🌿 Kualitas Udara Bandung'
        ];

        tampilkanCuaca(dataCuaca);
    });
}

function tampilkanCuaca(dataCuaca) {
    const item = document.querySelectorAll('.cuaca-item');

    dataCuaca.forEach((teks, i) => {
        if (item[i]) {
            item[i].innerHTML = teks;
        }
    });
}

function putarCuaca() {
    const slider = document.getElementById('cuaca-slider');

    indexCuaca++;

    if (indexCuaca >= 5) {
        indexCuaca = 0;
    }

    slider.style.transform =
        `translateY(-${indexCuaca * 22}px)`;
}
ambilCuaca();
setInterval(ambilCuaca, 60000); // refresh API tiap 1 menit
setInterval(putarCuaca, 5000);  // ganti tampilan tiap 5 detik

    // 3. KODE INTERAKTIF GRADASI MULUS PER ANGKA (MENGGUNAKAN HSL)
    const semuaInput = document.querySelectorAll('.menu-input');
    
    semuaInput.forEach(input => {
        input.addEventListener('input', function() {
            const kotakMenu = this.closest('.menu-item');
            const jumlah = parseInt(this.value) || 0;
            
            if (jumlah > 0) {
                kotakMenu.classList.add('terpilih');
                
                let tingkatCerah = 64 - ((jumlah - 1) * 4);
                if (tingkatCerah < 24) tingkatCerah = 24; 
                
                kotakMenu.style.backgroundColor = `hsl(122, 50%, ${tingkatCerah}%)`;
            } else {
                kotakMenu.classList.remove('terpilih');
                kotakMenu.style.backgroundColor = 'rgba(255, 255, 255, 0.15)';
            }
        });
    });
</script>
